spring:
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_USER=sa;DB_PASSWORD=
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  security:
    jwt:
      secret: this-is-a-very-secure-secret-key-with-at-least-256-bits-please-change-in-production
      expiration: 86400000
      refresh-expiration: 604800000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:80
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
  management:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: always

server:
  port: 8080

logging:
  level:
    com.taskmanagement: DEBUG
    org.springframework.security: DEBUG